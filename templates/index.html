<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b63d6">
    <title>AutoShorts</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header class="site-header">
        <div class="container">
            <h1 class="logo">AutoShorts</h1>
            <p class="tag">Quickly extract and create short clips from long recordings</p>
        </div>
    </header>

    <main class="container">
        <section class="panel">
            <h2 class="panel-title">Transcriber</h2>
            <p class="muted">Upload a video or audio file and the pipeline will generate a transcript and clips.</p>

            <form id="uploadForm" class="upload-form" enctype="multipart/form-data">
                <label class="file-input" for="fileInput">
                    <span class="file-icon">📁</span>
                    <span class="file-label">Choose a video or audio file</span>
                    <input id="fileInput" type="file" name="file" accept="video/*,audio/*" required>
                </label>

                <div class="form-row">
                    <button id="submitBtn" type="submit" class="btn-primary">Upload & Transcribe</button>
                    <div class="progress-wrap" aria-hidden="true">
                        <div id="progressBar" class="progress-bar"></div>
                        <div id="progressText" class="progress-text"></div>
                    </div>
                </div>
            </form>

            <div id="status" class="status" aria-live="polite"></div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">Built for quick iteration • Check server logs for detailed output</div>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
