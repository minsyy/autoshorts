<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b63d6">
    <meta name="description" content="AutoShorts - Upload audio or video files to generate transcripts and short clips automatically.">

    <title>AutoShorts</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<header class="site-header">

    <div class="container">

        <h1 class="logo">
            AutoShorts
        </h1>

        <p class="tagline">
            Upload your audio or video and automatically generate transcripts with short clips.
        </p>

    </div>

</header>

<main class="container">

    <section class="panel">

        <h2 class="panel-title">
            Upload Media
        </h2>

        <p class="panel-description">
            Select an audio or video file to begin automatic transcription and short clip generation.
        </p>

        <form
            id="uploadForm"
            class="upload-form"
            enctype="multipart/form-data">

            <label
                for="fileInput"
                class="file-input">

                <div class="upload-content">

                    <div class="upload-icon">
                        📁
                    </div>

                    <div class="upload-text">

                        <strong>
                            Choose File
                        </strong>

                        <span>
                            Supported: MP4, MOV, MP3, WAV and other common formats
                        </span>

                    </div>

                </div>

                <input
                    type="file"
                    id="fileInput"
                    name="file"
                    accept="video/*,audio/*"
                    required>

            </label>

            <div class="selected-file">

                <span id="selectedFileName">
                    No file selected
                </span>

            </div>

            <button
                id="submitBtn"
                class="btn-primary"
                type="submit">

                Upload & Generate

            </button>

            <div class="progress-wrap">

                <div class="progress">

                    <div
                        id="progressBar"
                        class="progress-bar">

                    </div>

                </div>

                <div
                    id="progressText"
                    class="progress-text">

                    0%

                </div>

            </div>

        </form>

        <div
            id="status"
            class="status"
            aria-live="polite">

        </div>

    </section>

</main>

<footer class="site-footer">

    <div class="container">

        <p>
            AutoShorts • Responsive UI • Cross Browser Compatible
        </p>

    </div>

</footer>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
